services:
  web:
    build:
      context: .
      dockerfile: deploy/docker/frontend.Dockerfile
      target: development
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - grantfoster_node_modules:/app/node_modules
      - grantfoster_next:/app/.next
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    command: sh -c "npm ci && npm run dev:docker"

volumes:
  grantfoster_node_modules:
  grantfoster_next:
